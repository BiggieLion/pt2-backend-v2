services:
  db:
    image: postgres:16-alpine
    container_name: pt2-db-prod
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - pt2-db-network
    security_opt:
      - no-new-privileges:true
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pt2-backend-prod
    env_file:
      - .env.production
    environment:
      DB_HOST: db
      DB_PORT: 5432
      NODE_ENV: production
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pt2-network
      - pt2-db-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    # Resource limits efectivos para docker compose standalone (no Swarm)
    mem_limit: 512m
    memswap_limit: 512m
    cpus: "1.0"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pt2-network:
    driver: bridge
  pt2-db-network:
    driver: bridge
    internal: true

volumes:
  pgdata_prod:
    driver: local
